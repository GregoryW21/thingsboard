name: "Security Scan: Trivy"

on:
  workflow_dispatch: # Manual trigger only

jobs:
  trivy-scan:
    runs-on: ubuntu-latest
    name: Run Trivy Scanner
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Trivy Native CLI
        uses: aquasecurity/setup-trivy@v0.2.6
        with:
          version: 'latest'

      - name: Run Trivy Scan via Shell
        run: |
          # We explicitly skip the massive Java code directories (common, application)
          # to stop the file walker from crashing the runner.
          trivy fs . \
            --scanners misconfig \
            --skip-dirs common,application \
            --timeout 15m \
            --format table \
            --output trivy-results.txt

      - name: Upload Readable Results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-security-report
          path: trivy-results.txt
