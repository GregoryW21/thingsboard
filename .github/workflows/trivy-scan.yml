name: "Security Scan: Trivy"

on:
  workflow_dispatch: # Manual trigger only

jobs:
  trivy-scan:
    runs-on: ubuntu-latest
    name: Run Trivy Scanner
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Trivy Native CLI
        uses: aquasecurity/setup-trivy@v0.2.6
        with:
          version: 'latest'

      - name: Run Trivy Scan via Shell
        run: |
          # We force Trivy to ignore EVERY SINGLE pom.xml file in the entire project.
          # This protects the runner's memory while still scanning the Dockerfiles.
          trivy fs . \
            --scanners misconfig \
            --skip-files "**/pom.xml" \
            --timeout 15m \
            --format table \
            --output trivy-results.txt

      - name: Upload Readable Results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-security-report
          path: trivy-results.txt
